<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — Lakecode</title>
  <meta name="description" content="Sign in to your Lakecode account.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="pages.css">
</head>
<body>

  <!-- Nav -->
  <nav class="nav">
    <div class="nav-inner">
      <a href="/" class="logo">
        <img src="/logo-dark.png" alt="Lakecode" class="logo-icon logo-dark"><img src="/logo-light.png" alt="Lakecode" class="logo-icon logo-light"> lakecode
      </a>
      <div class="nav-links">
        <a href="/product">Product</a>
        <a href="/pricing">Pricing</a>
        <a href="/docs">Docs</a>
        <a href="/blog">Blog</a>
        <a href="/signin">Sign in</a>
        <a href="/signin" class="btn btn-sm nav-auth-btn">Get started</a>
        <button class="theme-toggle" aria-label="Toggle theme">
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
      </div>
      <button class="nav-toggle" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- Sign In -->
  <section class="signin-page">
    <div class="container">
      <div class="signin-card">
        <div class="signin-header">
          <img src="/logo-dark.png" alt="Lakecode" class="logo-icon logo-dark" style="height: 36px;"><img src="/logo-light.png" alt="Lakecode" class="logo-icon logo-light" style="height: 36px;">
          <h1>Sign in to Lakecode</h1>
          <p>Access your dashboard, manage your plan, and view usage.</p>
        </div>
        <a href="#" id="google-signin" class="btn-google">
          <svg viewBox="0 0 24 24" width="20" height="20">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Sign in with Google
        </a>
        <p class="signin-note">By signing in, you agree to our terms of service.</p>
      </div>
    </div>
  </section>

  <script src="script.js"></script>
  <script>
    const API_URL = 'https://api.lakecode.ai';
    const urlParams = new URLSearchParams(window.location.search);
    const planIntent = urlParams.get('plan'); // e.g. "pro" or "team"

    // If already signed in, redirect to dashboard (with upgrade intent if present)
    if (localStorage.getItem('lk_key')) {
      const dest = planIntent ? `/dashboard?upgrade=${planIntent}` : '/dashboard';
      window.location.href = dest;
    }

    document.getElementById('google-signin').addEventListener('click', (e) => {
      e.preventDefault();
      // Pass plan through OAuth state so after sign-in, user lands on dashboard
      // with upgrade intent: state=web (free) or state=web:pro or state=web:team
      const state = planIntent ? `web:${planIntent}` : 'web';
      window.location.href = `${API_URL}/auth/start?state=${state}`;
    });
  </script>
</body>
</html>
