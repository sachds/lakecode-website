<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>lakecode — Sign In</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #e5e5e5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      max-width: 400px;
      width: 100%;
      padding: 2rem;
      text-align: center;
    }
    .logo {
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 0.5rem;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }
    .subtitle {
      color: #888;
      font-size: 0.875rem;
      margin-bottom: 2rem;
    }
    .card {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 2rem;
      margin-bottom: 1rem;
    }
    .user-code {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 2rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: 0.2em;
      margin: 1rem 0;
    }
    .user-code-label {
      color: #888;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      width: 100%;
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 8px;
      font-size: 0.9375rem;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.9; }
    .btn-google {
      background: #fff;
      color: #333;
    }
    .btn-google svg { width: 18px; height: 18px; }
    .btn-outline {
      background: transparent;
      border: 1px solid #444;
      color: #e5e5e5;
      margin-top: 0.75rem;
    }
    .btn-outline:hover { background: #222; }
    .btn-dashboard {
      background: #166534;
      color: #fff;
      margin-bottom: 0.75rem;
    }
    .btn-dashboard:hover { background: #15803d; }
    .success-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }
    .success-text {
      font-size: 1.125rem;
      color: #4ade80;
      margin-bottom: 0.5rem;
    }
    .logged-in-email {
      font-size: 0.875rem;
      color: #4ade80;
      margin-bottom: 1rem;
    }
    .muted { color: #666; font-size: 0.8125rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">lakecode</div>
    <div class="subtitle">Databricks-native AI CLI</div>

    <!-- Sign-in view (device flow) -->
    <div id="signin-view" class="card">
      <div class="user-code-label">Your verification code</div>
      <div class="user-code" id="user-code">--------</div>

      <a id="google-btn" class="btn btn-google" href="#">
        <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Sign in with Google
      </a>
    </div>

    <!-- Already logged in view -->
    <div id="logged-in-view" class="card hidden">
      <div class="success-icon">&#10003;</div>
      <div class="logged-in-email" id="logged-in-email"></div>
      <a href="/dashboard" class="btn btn-dashboard">Go to Dashboard</a>
      <button class="btn btn-outline" onclick="signOut()">Sign Out</button>
    </div>

    <!-- Success view (post-auth) -->
    <div id="success-view" class="card hidden">
      <div class="success-icon">&#10003;</div>
      <div class="success-text">You're authenticated!</div>
      <p class="muted" style="margin-bottom: 1rem;">Return to your terminal — the CLI is receiving your credentials now.</p>
      <a href="/dashboard" class="btn btn-dashboard">Go to Dashboard</a>
    </div>

    <p class="muted">By signing in, you agree to the lakecode Terms of Service.</p>
  </div>

  <script>
    const API_URL = 'https://api.lakecode.ai';
    const params = new URLSearchParams(window.location.search);
    const userCode = params.get('user_code');
    const storedKey = localStorage.getItem('lakecode_key');

    // Check if this is the success page
    if (window.location.pathname.includes('/auth/success') || params.get('success') === '1') {
      document.getElementById('signin-view').classList.add('hidden');
      document.getElementById('success-view').classList.remove('hidden');
    }
    // If user has a device code, show sign-in view
    else if (userCode) {
      document.getElementById('user-code').textContent =
        userCode.slice(0, 4) + '-' + userCode.slice(4);

      const googleBtn = document.getElementById('google-btn');
      googleBtn.href = `${API_URL}/auth/start?state=${userCode}`;
    }
    // If already logged in, show logged-in view
    else if (storedKey) {
      document.getElementById('signin-view').classList.add('hidden');
      document.getElementById('logged-in-view').classList.remove('hidden');

      // Try to fetch email from account
      fetch(`${API_URL}/account`, { headers: { 'x-api-key': storedKey } })
        .then(r => r.ok ? r.json() : Promise.reject())
        .then(data => {
          document.getElementById('logged-in-email').textContent = `Signed in as ${data.email}`;
        })
        .catch(() => {
          document.getElementById('logged-in-email').textContent = 'Signed in';
        });
    }
    // No code and not logged in — show sign-in with web flow
    else {
      const googleBtn = document.getElementById('google-btn');
      googleBtn.href = `${API_URL}/auth/start?state=web`;
      document.querySelector('.user-code-label').classList.add('hidden');
      document.querySelector('.user-code').classList.add('hidden');
    }

    function signOut() {
      localStorage.removeItem('lakecode_key');
      window.location.reload();
    }
  </script>
</body>
</html>
